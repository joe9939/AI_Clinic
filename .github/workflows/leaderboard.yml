name: Update Leaderboard

on:
  push:
    branches: [main]
    paths:
      - 'evaluations/*.json'
      - 'probes/*.json'
  workflow_dispatch:

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Embed symptom data into leaderboard
        run: |
          python scripts/embed_symptoms.py
      - name: Commit if changed
        run: |
          git config user.name "AI Clinic Bot"
          git config user.email "bot@ai-clinic.dev"
          git add leaderboard.json
          if git diff --cached --quiet; then
            echo "No changes to leaderboard"
          else
            git commit -m "chore: auto-update leaderboard with symptom data"
            git push
          fi
