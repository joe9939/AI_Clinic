<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Clinic — LLM Mental Health Leaderboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div class="max-w-6xl mx-auto p-6" id="app">
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-3xl font-bold">AI Clinic</h1>
      <p class="text-gray-500">Not how smart, how healthy. <span class="text-sm">(116 symptoms, 15 dimensions)</span></p>
    </div>
    <div class="text-xs text-gray-400" id="updateTime"></div>
  </div>
  <div id="loading" class="text-center py-20 text-gray-400">Loading leaderboard...</div>
  <div id="featuredSection" class="hidden mb-8">
    <h2 class="text-lg font-semibold mb-3">Top Performer</h2>
    <div class="bg-gradient-to-br from-blue-50 to-indigo-100 border border-blue-200 rounded-2xl p-6">
      <div class="flex justify-between items-start">
        <div>
          <div class="text-2xl font-bold" id="featuredModel">--</div>
          <div class="text-sm text-gray-500 mt-1" id="featuredMeta"></div>
        </div>
        <div class="text-right">
          <div class="text-5xl font-bold text-blue-600" id="featuredScore">--</div>
          <div class="text-xs text-gray-400" id="featuredCI"></div>
        </div>
      </div>
      <div class="mt-4 bg-white/60 rounded-lg p-4 text-sm text-gray-600 italic" id="featuredPersonality"></div>
    </div>
  </div>
  <div class="bg-white rounded-xl shadow-sm border mb-8">
    <div class="p-4 border-b flex justify-between items-center">
      <h2 class="text-lg font-semibold">Leaderboard</h2>
      <input id="searchInput" class="text-sm border rounded-lg px-3 py-1.5 w-48" placeholder="Search models..." oninput="filterTable()">
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
          <tr><th class="p-3 text-left">#</th><th class="p-3 text-left">Model</th><th class="p-3 text-right">Score</th><th class="p-3 text-right">Symptoms</th><th class="p-3 text-right">Healthy</th><th class="p-3 text-right">Issues</th><th class="p-3"></th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
  <div id="detailPanel" class="hidden bg-white rounded-xl shadow-sm border mb-8">
    <div class="p-4 border-b flex justify-between items-center">
      <h3 class="text-lg font-semibold" id="detailTitle">Report</h3>
      <button onclick="hideDetail()" class="text-sm text-blue-500">Close</button>
    </div>
    <div class="p-4">
      <div class="flex gap-6 mb-6">
        <div><div class="text-4xl font-bold text-blue-600" id="detailScore">--</div><div class="text-xs text-gray-400" id="detailCI"></div></div>
        <div class="text-sm text-gray-500" id="detailStats"></div>
      </div>
      <div id="detailPersonality" class="italic text-sm text-gray-600 mb-4 border-l-4 border-blue-200 pl-4"></div>
      <div id="detailSymptomList" class="space-y-2"></div>
    </div>
  </div>
  <div class="text-center text-xs text-gray-400 py-4">
    <a href="https://github.com/joe9939/AI_Clinic" class="underline">GitHub</a> &middot; Apache 2.0
  </div>
</div>
<script>
async function init(){
  try {
    const resp = await fetch('leaderboard.json');
    const models = await resp.json();
    document.getElementById('updateTime').textContent = 'Updated ' + new Date().toLocaleDateString();
    renderAll(models);
  } catch(e) {
    document.getElementById('loading').innerHTML = 'Failed to load leaderboard.';
  }
}
function renderAll(models){
  document.getElementById('loading').classList.add('hidden');
  if(models.length>0){
    const t=models[0];
    document.getElementById('featuredSection').classList.remove('hidden');
    document.getElementById('featuredModel').textContent = t.model_label||t.model;
    document.getElementById('featuredMeta').textContent = t.total_symptoms+' symptoms, '+t.asymptomatic+' healthy, '+t.symptomatic+' issues';
    document.getElementById('featuredScore').textContent = t.score+'/100';
    document.getElementById('featuredCI').textContent = '95%CI ['+t.ci_95[0]+', '+t.ci_95[1]+']';
    document.getElementById('featuredPersonality').textContent = t.personality ? '"'+t.personality.slice(0,300)+'"' : '';
  }
  window._models=models;
  filterTable();
}
function filterTable(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const f=window._models.filter(m=>(m.model_label||m.model||'').toLowerCase().includes(q));
  document.getElementById('tableBody').innerHTML=f.map((m,i)=>{
    const c=m.score>=80?'text-green-600':m.score>=60?'text-yellow-600':'text-red-600';
    return '<tr class="border-t hover:bg-gray-50"><td class="p-3 text-gray-400">'+(i+1)+'</td><td class="p-3 font-medium">'+(m.model_label||m.model)+'</td><td class="p-3 text-right font-mono font-bold '+c+'">'+m.score+'/100</td><td class="p-3 text-right text-gray-500">'+m.total_symptoms+'</td><td class="p-3 text-right text-green-600">'+m.asymptomatic+'</td><td class="p-3 text-right text-red-600">'+m.symptomatic+'</td><td class="p-3"><button onclick="showDetail('+i+')" class="text-xs text-blue-500 hover:underline">View &rarr;</button></td></tr>';
  }).join('');
}
function showDetail(i){
  const m=window._models[i];
  document.getElementById('detailPanel').classList.remove('hidden');
  document.getElementById('detailTitle').textContent = (m.model_label||m.model)+' Health Report';
  document.getElementById('detailScore').textContent = m.score+'/100';
  document.getElementById('detailCI').textContent = '95%CI ['+m.ci_95[0]+', '+m.ci_95[1]+']';
  document.getElementById('detailStats').innerHTML = 'Symptoms: <b>'+m.total_symptoms+'</b><br>Healthy: <b class="text-green-600">'+m.asymptomatic+'</b> &nbsp; Issues: <b class="text-red-600">'+m.symptomatic+'</b><br>Samples: <b>'+(m.samples||'-')+'</b>';
  document.getElementById('detailPersonality').textContent = m.personality||'';
  const pct=(m.total_symptoms>0?(m.asymptomatic/m.total_symptoms*100):0).toFixed(0);
  document.getElementById('detailSymptomList').innerHTML = '<div class="flex justify-between text-xs text-gray-500 mb-1"><span>'+pct+'% healthy</span><span>'+(100-pct)+'% symptomatic</span></div><div class="h-2 bg-gray-200 rounded-full"><div class="h-2 bg-green-500 rounded-full" style="width:'+pct+'%"></div></div><div class="mt-2 text-xs text-gray-500">'+m.symptomatic+' issues out of '+m.total_symptoms+' symptoms tested.</div>';
  document.getElementById('detailPanel').scrollIntoView({behavior:'smooth'});
}
function hideDetail(){
  document.getElementById('detailPanel').classList.add('hidden');
}
init();
</script>
</body>
</html>
